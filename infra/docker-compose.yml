name: g2-67-jr

x-restart-policy: &restart_policy
  restart: unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------- 1. PostgreSQL 16 ----------
  postgres16:
    image: postgres:16-alpine
    container_name: gmrag-postgres16
    <<: *restart_policy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 2. Qdrant ----------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: gmrag-qdrant
    <<: *restart_policy
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 3. MinIO ----------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: gmrag-minio
    <<: *restart_policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 4. Redis ----------
  redis:
    image: redis:7-alpine
    container_name: gmrag-redis
    <<: *restart_policy
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 5. OpenFGA migrations ----------
  openfga-migrate:
    image: openfga/openfga:v1.18.1
    container_name: gmrag-openfga-migrate
    command: migrate
    restart: "no"
    depends_on:
      postgres16:
        condition: service_healthy
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: ${OPENFGA_DATASTORE_URI}
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 6. OpenFGA authorization ----------
  openfga:
    image: openfga/openfga:v1.18.1
    container_name: gmrag-openfga
    <<: *restart_policy
    command: run
    depends_on:
      postgres16:
        condition: service_healthy
      openfga-migrate:
        condition: service_completed_successfully
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: ${OPENFGA_DATASTORE_URI}
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: ${OPENFGA_API_TOKEN}
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_LOG_FORMAT: json
    ports:
      - "${OPENFGA_HTTP_PORT:-8089}:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 7. Ollama ----------
  ollama:
    image: ollama/ollama:0.5.7
    container_name: gmrag-ollama
    <<: *restart_policy
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' 2>/dev/null && echo OK || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 8. Keycloak ----------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: gmrag-keycloak
    <<: *restart_policy
    command: ["start-dev", "--http-port=8080", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 9. Backend (Rust / axum) ----------
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    image: gmrag/backend:dev
    container_name: gmrag-backend
    <<: *restart_policy
    depends_on:
      postgres16:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      openfga:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION_DEFAULT: ${QDRANT_COLLECTION_DEFAULT}
      REDIS_URL: ${REDIS_URL}
      OPENFGA_API_URL: ${OPENFGA_API_URL}
      OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      OPENFGA_AUTHORIZATION_MODEL_ID: ${OPENFGA_AUTHORIZATION_MODEL_ID}
      OPENFGA_API_TOKEN: ${OPENFGA_API_TOKEN}
      OPENFGA_REQUEST_TIMEOUT_MS: ${OPENFGA_REQUEST_TIMEOUT_MS:-1500}
      OPENFGA_HIGHER_CONSISTENCY_WINDOW_SECS: ${OPENFGA_HIGHER_CONSISTENCY_WINDOW_SECS:-5}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_ISSUER_VERIFY: ${KEYCLOAK_ISSUER_VERIFY:-${KEYCLOAK_ISSUER}}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      OLLAMA_HOST: ${OLLAMA_HOST}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      GMRAG_RUST_LOG: ${GMRAG_RUST_LOG}
      GMRAG_HTTP_BIND: ${GMRAG_HTTP_BIND}
      GMRAG_TENANT_HEADER: ${GMRAG_TENANT_HEADER}
      GMRAG_RATELIMIT_ENABLED: ${GMRAG_RATELIMIT_ENABLED:-true}
      GMRAG_RATELIMIT_AUTH_PER_MIN: ${GMRAG_RATELIMIT_AUTH_PER_MIN:-10}
      GMRAG_RATELIMIT_JOB_CREATE_PER_MIN: ${GMRAG_RATELIMIT_JOB_CREATE_PER_MIN:-20}
      GMRAG_RATELIMIT_CHAT_CREATE_PER_MIN: ${GMRAG_RATELIMIT_CHAT_CREATE_PER_MIN:-30}
      GMRAG_RATELIMIT_CHAT_CONCURRENT_PER_TENANT: ${GMRAG_RATELIMIT_CHAT_CONCURRENT_PER_TENANT:-50}
      GMRAG_RATELIMIT_GENERAL_PER_MIN: ${GMRAG_RATELIMIT_GENERAL_PER_MIN:-300}
      # T84D tuning: explicit pool ceiling + chat history length.
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      GMRAG_CHAT_HISTORY_LIMIT: ${GMRAG_CHAT_HISTORY_LIMIT:-10}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS}
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gmrag-net
    logging: *logging

  # ---------- 10. Worker (Rust) ----------
  worker:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    image: gmrag/backend:dev
    container_name: gmrag-worker
    <<: *restart_policy
    command: ["gmrag-worker"]
    depends_on:
      postgres16:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION_DEFAULT: ${QDRANT_COLLECTION_DEFAULT}
      REDIS_URL: ${REDIS_URL}
      OPENFGA_API_URL: ${OPENFGA_API_URL}
      OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      OPENFGA_AUTHORIZATION_MODEL_ID: ${OPENFGA_AUTHORIZATION_MODEL_ID}
      OPENFGA_API_TOKEN: ${OPENFGA_API_TOKEN}
      OPENFGA_REQUEST_TIMEOUT_MS: ${OPENFGA_REQUEST_TIMEOUT_MS:-1500}
      OPENFGA_HIGHER_CONSISTENCY_WINDOW_SECS: ${OPENFGA_HIGHER_CONSISTENCY_WINDOW_SECS:-5}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      GMRAG_RUST_LOG: ${GMRAG_RUST_LOG}
      GMRAG_WORKER_CONCURRENCY: ${GMRAG_WORKER_CONCURRENCY}
      # Keycloak OIDC — required by shared Config (worker validates JWT issuers
      # when introspecting tenant LLM config / outbox events).
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_ISSUER_VERIFY: ${KEYCLOAK_ISSUER_VERIFY:-${KEYCLOAK_ISSUER}}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GMRAG_TENANT_HEADER: ${GMRAG_TENANT_HEADER}
      GMRAG_WORKER_METRICS_BIND: ${GMRAG_WORKER_METRICS_BIND:-0.0.0.0:9091}
      # T84D tuning: pool ceiling + outbox relay / sweeper / OCR flags.
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      GMRAG_OCR_ENABLED: ${GMRAG_OCR_ENABLED:-false}
      GMRAG_OUTBOX_POLL_INTERVAL_SECS: ${GMRAG_OUTBOX_POLL_INTERVAL_SECS:-3}
      GMRAG_SWEEP_INTERVAL_SECS: ${GMRAG_SWEEP_INTERVAL_SECS:-60}
      # Phase 0 (TASK-P0-04): bounded retention loop (admin_pool).
      GMRAG_RETENTION_INTERVAL_SECS: ${GMRAG_RETENTION_INTERVAL_SECS:-86400}
      GMRAG_OUTBOX_RETENTION_DAYS: ${GMRAG_OUTBOX_RETENTION_DAYS:-30}
      GMRAG_USAGE_RETENTION_DAYS: ${GMRAG_USAGE_RETENTION_DAYS:-90}
      GMRAG_AUDIT_RETENTION_DAYS: ${GMRAG_AUDIT_RETENTION_DAYS:-365}
      GMRAG_RETENTION_BATCH_SIZE: ${GMRAG_RETENTION_BATCH_SIZE:-1000}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f gmrag-worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gmrag-net
    ports:
      - "9091:9091"
    logging: *logging

  # ---------- 11. Frontend (Next.js) ----------
  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        # NEXT_PUBLIC_* are build-time inlined — inject them into the builder.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID}
        NEXT_PUBLIC_TENANT_HEADER: ${NEXT_PUBLIC_TENANT_HEADER}
    image: gmrag/frontend:dev
    container_name: gmrag-frontend
    <<: *restart_policy
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID}
      NEXT_PUBLIC_TENANT_HEADER: ${NEXT_PUBLIC_TENANT_HEADER}
      # NextAuth v5 (server-only)
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      # Canonical public URL — forces NextAuth to build callback/redirect URLs
      # against the host-side origin instead of the container's 0.0.0.0 binding.
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      KEYCLOAK_FRONTEND_CLIENT_SECRET: ${KEYCLOAK_FRONTEND_CLIENT_SECRET}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
      # OIDC issuer — server (container-internal) vs browser (host-side).
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_ISSUER_PUBLIC: ${KEYCLOAK_ISSUER_PUBLIC}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gmrag-net
    logging: *logging

networks:
  gmrag-net:
    name: gmrag-net
    driver: bridge

volumes:
  pgdata:
    name: gmrag-pgdata
  qdrant_data:
    name: gmrag-qdrant-data
  minio_data:
    name: gmrag-minio-data
  redis_data:
    name: gmrag-redis-data
  ollama_data:
    name: gmrag-ollama-data
  keycloak_data:
    name: gmrag-keycloak-data
